PACKAGE_NAME="facer"
PACKAGE_VERSION="0.2"

MAKE[0]="make KERNELDIR=/lib/modules/${kernelver}/build"
CLEAN="make clean"

BUILT_MODULE_NAME[0]="facer"
BUILT_MODULE_LOCATION[0]=""
DEST_MODULE_LOCATION[0]="/kernel/drivers/platform/x86"

BUILT_MODULE_NAME[1]="acer-wmi-battery"
BUILT_MODULE_LOCATION[1]=""
DEST_MODULE_LOCATION[1]="/kernel/drivers/platform/x86"

BUILT_MODULE_NAME[2]="acpi_ec"
BUILT_MODULE_LOCATION[2]=""
DEST_MODULE_LOCATION[2]="/kernel/drivers/acpi"

AUTOINSTALL="yes"
